name: Full CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Building..."

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - run: echo "Testing..."

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t my-app .
      - name: Run Container
        run: docker run my-app

  deploy:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Deploy
        run: echo "Deploying app..."
