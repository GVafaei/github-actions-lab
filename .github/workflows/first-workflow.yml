name: Multi Job Workflow

on:
  push:
    branches: [main]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Build step
        run: echo "Building..."

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Test step
        run: echo "Testing..."

   docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t my-app .

      - name: Run Container
        run: docker run my-app

    deploy:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Deploy
        run: echo "Deploying app..."
